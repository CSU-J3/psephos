# psephos source registry and watchlist
# Collectors load this. Admiralty grades follow the cyber-osint-research skill:
# source reliability A-F, information credibility 1-6.
# Verify feed/endpoint URLs on first run; the structure matters more than any single URL.

meta:
  project: psephos
  timezone: America/Denver
  cron: "0 */6 * * *"   # every 6 hours, matches existing tracker cadence

# ===========================================================================
# CHANNEL 1: LEGISLATION  (Congress.gov API)
# ===========================================================================
legislation:
  api:
    base: https://api.congress.gov/v3
    key_env: CONGRESS_API_KEY        # free key: https://api.congress.gov
    rate_limit_per_hour: 5000
  # Per bill, pull:
  #   /bill/{congress}/{type}/{number}
  #   /bill/{congress}/{type}/{number}/actions
  #   /bill/{congress}/{type}/{number}/amendments
  #   /bill/{congress}/{type}/{number}/relatedbills
  #   /bill/{congress}/{type}/{number}/cosponsors
  default_grade: { source: A, info: "1" }   # primary government record
  watchlist:
    - bill_id: hr22-119
      congress: 119
      type: hr
      number: 22
      short_title: SAVE Act
      watch_reason: Original proof-of-citizenship registration bill; House-passed 220-208 (Apr 2025).
    - bill_id: s128-119
      congress: 119
      type: s
      number: 128
      short_title: SAVE Act (Senate companion)
      watch_reason: Lee companion to H.R. 22; stalled.
    - bill_id: hr7296-119
      congress: 119
      type: hr
      number: 7296
      short_title: SAVE America Act
      watch_reason: Roy refile (Jan 2026).
    - bill_id: s3752-119
      congress: 119
      type: s
      number: 3752
      short_title: SAVE America Act
      watch_reason: Lee Senate refile (Jan 2026); the bill Trump is pressuring the Senate to pass.
    - bill_id: hr7300-119
      congress: 119
      type: hr
      number: 7300
      short_title: MEGA Act
      watch_reason: Make Elections Great Again; near-identical, CHA hearing Feb 2026.
    # ASSERTED, HUMAN-MAINTAINED FACT (not auto-detected): S. 1383 is the unrelated
    # bill the SAVE/proof-of-citizenship payload currently rides. The news collector
    # routes "procedural term + subject term" hits to this is_vehicle bill at C3.
    # WARNING: if the provisions move to a NEW vehicle, you must edit BOTH this
    # watchlist entry (move is_vehicle) AND keep subject_terms current by hand.
    # Nothing detects the switch -- if you don't, the news channel silently goes
    # quiet (it stops attaching the maneuver to any bill).
    - bill_id: s1383-119
      congress: 119
      type: s
      number: 1383
      is_vehicle: true
      watch_reason: Unrelated bill used as the vehicle; voting provisions passed House 218-213 as an amendment (Feb 11 2026).
  # Formal parliamentary phrases. These match bill_actions text precisely but almost
  # never appear in news headlines/summaries (verified: 0 of 539 live items).
  procedural_terms:
    - "amendment to"
    - "held until"
    - "floor calendar"
    - "discharge petition"
    - "rule vote"
    - "unanimous consent"
    - "motion to proceed"
    - "cloture"
  # News-register movement vocabulary. The news collector's second signal is the UNION
  # of procedural_terms + these. Curated to mean MOVEMENT (a bill acting/being acted on),
  # not mere topic mention -- bare "vote"/"voting" are deliberately excluded as too loose.
  # An item attaches to a bill only with a movement term AND a subject term (or a bill
  # number), so over-tagging unrelated reporting stays blocked.
  news_movement_terms:
    - "passed"
    - "passes"
    - "approved"
    - "adopted"
    - "adopts"
    - "blocked"
    - "stalled"
    - "filibuster"
    - "veto"
    - "signed into law"
    - "tucked into"
    - "attached to"
    - "added to"
    - "fast-track"
    - "tabled"
    - "advances"
    - "advanced"
  # Subject vocabulary for the news cross-reference (Session 2). DELIBERATELY NARROW
  # and concrete to avoid over-tagging unrelated reporting -- do NOT add loose terms
  # like "election integrity" or "voter fraud". The watchlist short_titles above are
  # merged into this list by the collector, so SAVE Act / SAVE America Act / MEGA Act
  # are covered without repeating them here.
  subject_terms:
    - "proof of citizenship"
    - "documentary proof"
    - "SAVE Act"
    - "SAVE America Act"
    - "noncitizen voting"

# ===========================================================================
# CORRELATION LAYER: curated event anchors  (export/snapshots.py)
# ===========================================================================
# The export layer groups same-event news into one per-bill timeline node.
# Grouping is HAND-MAINTAINED here, like the s1383 vehicle alias above -- there
# is no similarity threshold and no fuzzy/shared-token matching (the dedup note
# under `news.dedup` explains why: many outlets on one event is corroboration,
# not duplication, so the survivors are deliberately distinct and fuzzy title
# matching cannot regroup them). An anchor groups news items that are scoped to
# `bill`, fall inside `window` (inclusive, date-only), AND contain `phrase`.
# The window does the heavy lifting; the phrase disambiguates within it.
#
# Grouping is ADDITIVE and lossless: every item still appears exactly once, as a
# standalone entry or as a member of one cluster node. An un-anchored event stays
# a set of individual items -- an acceptable miss, never a wrong merge. Keep
# anchors narrow and non-overlapping (same discipline as subject_terms). When the
# vehicle changes, add the new anchor by hand; nothing detects the event for you.
event_anchors:
  - id: s1383-housing-hostage
    label: "Trump withholds housing-bill signing to pressure the SAVE America Act"
    bill: s1383-119
    phrase: housing            # str or list of str; any single match qualifies
    window: { start: "2026-06-24", end: "2026-06-25" }   # inclusive, date-only

# ===========================================================================
# CHANNEL 2: EXECUTIVE ACTION  (Federal Register API)
# ===========================================================================
executive:
  api:
    base: https://www.federalregister.gov/api/v1
    key_env: null                    # no key required
  # /documents.json?conditions[agencies][]=...&conditions[term]=...&conditions[publication_date][gte]=...
  # Confirm agency slugs against /api/v1/agencies on first run.
  since: "2025-01-01"                 # publication_date[gte] floor; bounds first-run backfill
                                      # to the election-EO / DOJ-voter-data era (FR archive spans decades).
  agencies:
    - election-assistance-commission
    - justice-department
    - homeland-security-department
  terms:
    - election
    - voter registration
    - voter roll
    - proof of citizenship
    - mail ballot
  default_grade: { source: A, info: "1" }

# ===========================================================================
# CHANNEL 3: LITIGATION  (CourtListener / RECAP, Free Law Project)
# ===========================================================================
litigation:
  api:
    base: https://www.courtlistener.com/api/rest/v4
    key_env: COURTLISTENER_TOKEN     # free token from a CourtListener account
  default_grade: { source: A, info: "1" }   # primary court record
  # Which docket entries become A1 items (the timeline). case_entries keeps EVERY entry;
  # only these substantive types are promoted to items. The exclude list is required: a
  # "MOTION for Leave to Appear Pro Hac Vice" matches "motion" and routine pro-hac/appearance
  # orders match "order" -- without it the timeline fills with docket noise (this docket is
  # ~half notices of appearance / pro hac vice).
  substantive_entry_types:
    - complaint
    - motion
    - opposition
    - reply
    - order
    - opinion
    - memorandum
    - judgment
    - notice of appeal
    - stipulation
  excluded_entry_phrases:
    - pro hac vice
    - notice of appearance
    - certificate of disclosure
    - corporate affiliations
    - return of service
    - waiver of service
    - summons
  # Seed the case list from maintained trackers, then poll dockets for movement.
  seed_trackers:
    - name: UW State Democracy Research Initiative, DOJ voter-data suit tracker
      url: https://statedemocracy.law.wisc.edu/our-work/tracker-doj-lawsuits-seeking-states-sensitive-voter-data
      grade: { source: B, info: "2" }
    - name: States United, Roll Calls
      url: https://statesunited.org/roll-calls/
      grade: { source: B, info: "2" }
    - name: Democracy Docket, cases
      url: https://www.democracydocket.com/cases/
      grade: { source: B, info: "2" }
  # Confirmed captions to seed before the tracker scrape lands; extend from the trackers above.
  seed_cases:
    - caption: United States v. Weber
      category: voter-data
      court: C.D. Cal.
      notes: DOJ suit for California voter rolls; dismissed.
    - caption: Common Cause v. U.S. Department of Justice
      docket_number: 1:26-cv-01352
      court: D.D.C.
      court_id: dcd                   # CourtListener court id, for exact docket_number+court resolution
      category: voter-data
      notes: Challenges the DOJ master voter database under the Privacy Act and APA.
    - caption: League of Women Voters v. U.S. Department of Homeland Security
      docket_number: 1:25-cv-03501
      court: D.D.C.
      court_id: dcd
      category: voter-data
      notes: Alleges DHS turned SAVE into a national citizenship database.

# ===========================================================================
# CHANNEL 4: ADMINISTRATIVE COERCION + NEWS  (RSS + Google News)
# ===========================================================================
# The demand letters and funding threats are not in any structured feed.
# They surface here first, then become dockets in Channel 3 once a state resists.
news:
  feeds:                                            # URLs fetched live, entry counts > 0
    - id: votebeat
      url: https://www.votebeat.org/arc/outboundfeeds/rss/?outputType=xml   # Arc XP feed path
      grade: { source: B, info: "2" }
    - id: democracy-docket
      url: https://www.democracydocket.com/news-alerts/feed/   # canonical, full content, 10 entries (Substack mirror returned only 2)
      grade: { source: B, info: "2" }
    - id: bolts
      url: https://boltsmag.org/feed/
      grade: { source: B, info: "2" }
    - id: states-united
      url: https://statesunited.org/feed/
      grade: { source: B, info: "2" }
  google_news:
    base: https://news.google.com/rss/search
    queries:
      - "SAVE America Act"
      - "proof of citizenship voting"
      - "DOJ voter rolls"
      - "voter data lawsuit"
      - "election executive order"
      - "voter roll federal funding"
    grade: { source: C, info: "3" }    # aggregated; corroborate before promoting an item
  dedup:
    stage1: canonical_url              # strip utm_*, fragments, trailing slash, then exact-match
    stage2: title_norm                 # sha256 over normalized title + lede; fuzzy match near-dupes
    near_dupe_threshold: 0.90          # rapidfuzz token_sort_ratio over normalized titles
    # Do NOT lower this: many outlets covering one event is corroboration, not duplication;
    # collapsing them destroys the multi-source signal. Event-grouping is a timeline-layer job.

# ===========================================================================
# CHANNEL 5: STATE LEGISLATION  (LegiScan API)
# ===========================================================================
# Items-only, mirrors the executive channel: state bills are leaf items with no
# bill/case reference and their own data/state.json. The change-hash pattern is
# the whole game -- one getMasterList per state per run, then getBill ONLY on
# election bills whose change_hash moved, so the free-tier 30k queries/month cap
# is never at risk. See collectors/state.py and the state_seen table.
state:
  api:
    base: https://api.legiscan.com/
    key_env: LEGISCAN_API_KEY          # free key: https://legiscan.com/legiscan
  states: [TX, GA, FL, AZ, WI, PA, MI, NC, OH]   # start focused; the change-hash
                                                 # pattern scales to all 50 if wanted
  terms:                              # word-boundary phrase filter (see election_match).
                                      # Bare election/voter/voting/ballot are DELIBERATELY
                                      # excluded: they flood with bond / ad-valorem-tax /
                                      # appraiser elections. These phrases name the actual
                                      # voting-rights fight; the bare single words are the flood.
    - voter registration
    - voter roll
    - proof of citizenship
    - mail ballot
    - absentee
    - provisional ballot
    - same-day registration
    - voter id
    - redistricting
  max_getbill_per_run: 500        # budget guard; change-hash resumes next run if hit
  default_grade: { source: B, info: "2" }   # LegiScan is a maintained aggregator (spec's B2 tier)
