name: collect

on:
  # schedule:
  #   - cron: "0 */6 * * *"   # every 6 hours (UTC); re-enable once news/litigation/export land
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bootstrap remote schema (idempotent)
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        # Routes through db.py's dual-backend to the libSQL remote. schema.sql is
        # CREATE ... IF NOT EXISTS, so this is a no-op on the seeded DB and a clean
        # self-bootstrap on a fresh one. No local psephos.db is created on the runner.
        run: python -m db

      - name: Run collectors
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          # LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}   # phase 3
        run: |
          python -m collectors.legislation
          python -m collectors.litigation
          python -m collectors.news
          # python -m collectors.executive   # enable in phase 2
          # python -m collectors.state        # enable in phase 3

      - name: Export JSON snapshots
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python -m export.snapshots       # reads Turso; writes data/*.json for the view and for diffs

      - name: Commit data changes
        run: |
          git config user.name "psephos-bot"
          git config user.email "actions@users.noreply.github.com"
          # Stage only the text snapshots explicitly. NOT `git add data/`: data/psephos.db
          # is not in .gitignore, so a glob add could start committing the binary.
          git add data/bills.json data/cases.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: scheduled collection $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
