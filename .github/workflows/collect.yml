name: collect

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize database if missing
        run: |
          mkdir -p data
          if [ ! -f data/psephos.db ]; then
            sudo apt-get update && sudo apt-get install -y sqlite3
            sqlite3 data/psephos.db < schema.sql
          fi

      - name: Run collectors
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
          # LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}   # phase 3
        run: |
          python -m collectors.legislation
          python -m collectors.litigation
          python -m collectors.news
          # python -m collectors.executive   # enable in phase 2
          # python -m collectors.state        # enable in phase 3

      - name: Export JSON snapshots
        run: python -m export.snapshots       # writes data/*.json for the view and for diffs

      - name: Commit data changes
        run: |
          git config user.name "psephos-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: scheduled collection $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
